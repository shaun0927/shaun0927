name: Update Tokscale Dashboard

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tokscale-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater
        run: python3 update_tokscale.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update tokscale dashboard ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
